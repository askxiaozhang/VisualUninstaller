name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install uv
      run: pip install uv

    - name: Install dependencies
      run: uv sync

    - name: Build EXE with PyInstaller
      run: |
        uv run pyinstaller --onefile --windowed --name "VisualUninstaller" main.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: VisualUninstaller-exe
        path: dist/VisualUninstaller.exe
        retention-days: 30
